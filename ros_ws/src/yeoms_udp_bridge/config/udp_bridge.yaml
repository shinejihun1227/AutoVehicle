udp_bridge:
  bind_ip: "0.0.0.0"
  ubuntu_ip: "192.168.0.200"
  morai_ip: "192.168.0.151"

  ports:
    camera: 1001
    lidar: 2001
    gps: 3001
    imu: 4001
    collision_data: 907
    competition_vehicle_status: 909
    ego_ctrl_cmd_morai: 9093
    ego_ctrl_cmd_local: 9094

  monitor:
    print_payload_hex_bytes: 181
    print_rate_hz: 1.0

  status_adapter:
    # Experimental parser inferred from captured 181-byte #MoraiInfo$ screenshots.
    # Change this back to "raw" if the published pose values look unstable.
    parser_mode: "photo_guess"
    vehicle_status_port: 909
    pose_topic: "/localization/ego_pose"
    twist_topic: "/localization/ego_twist"
    frame_id: "map"

    # All offsets are byte offsets from the beginning of the UDP payload.
    # photo_guess assumption from the current screenshots:
    #   yaw: float32 at 86, x: float32 at 94, y: float32 at 98.
    # x/y are origin-shifted on node startup so local waypoints can begin near 0,0.
    little_endian: true
    x_offset: 94
    y_offset: 98
    z_offset: -1
    yaw_offset: 86
    yaw_unit: "deg"
    velocity_x_offset: -1
    velocity_y_offset: -1
    velocity_z_offset: -1
    numeric_type: "float32"
    auto_origin: true
    max_reasonable_speed_mps: 50.0

  ctrl_sender:
    subscribe_topic: "/control/ctrl_cmd"
    target_ip: "192.168.0.151"
    target_port: 9093
    local_port: 9094
    ctrl_mode: 2
    gear: 4
    long_cmd_type: 1
