udp_bridge:
  bind_ip: "0.0.0.0"
  ubuntu_ip: "192.168.0.200"
  morai_ip: "192.168.0.151"

  ports:
    camera: 1001
    lidar: 2001
    gps: 3001
    imu: 4001
    collision_data: 907
    competition_vehicle_status: 909
    ego_ctrl_cmd_morai: 9093
    ego_ctrl_cmd_local: 9094

  monitor:
    print_payload_hex_bytes: 181
    print_rate_hz: 1.0

  status_adapter:
    # Start in raw mode until the exact competition packet layout is confirmed.
    parser_mode: "raw"
    vehicle_status_port: 909
    pose_topic: "/localization/ego_pose"
    twist_topic: "/localization/ego_twist"
    frame_id: "map"

    # Use these only after packet offsets are confirmed from MORAI docs/example code.
    # All offsets are byte offsets from the beginning of the UDP payload.
    little_endian: true
    x_offset: -1
    y_offset: -1
    z_offset: -1
    yaw_offset: -1
    yaw_unit: "deg"
    velocity_x_offset: -1
    velocity_y_offset: -1
    velocity_z_offset: -1
    numeric_type: "float64"

  gps_adapter:
    gps_port: 3001
    pose_topic: "/localization/ego_pose"
    twist_topic: "/localization/ego_twist"
    frame_id: "map"
    auto_origin: true
    # MORAI GPRMC speed/course can stay zero in some UDP setups, so use x/y
    # displacement as the default motion estimate.
    motion_source: "position"
    min_course_speed_mps: 0.2
    min_position_delta_m: 0.03
    max_reasonable_speed_mps: 50.0

  ctrl_sender:
    subscribe_topic: "/control/ctrl_cmd"
    target_ip: "192.168.0.151"
    target_port: 9093
    local_port: 9094
    ctrl_mode: 2
    gear: 4
    long_cmd_type: 1
