stanley:
  waypoint_file: "$(find yeoms_control)/waypoints/test_straight.csv"
  pose_topic: "/localization/ego_pose"
  twist_topic: "/localization/ego_twist"
  odom_topic: "/localization/ego_odom"
  use_odometry: false
  command_topic: "/control/ctrl_cmd"
  command_type: "twist"
  frame_id: "map"

  # Coordinate convention:
  # map.x=East, map.y=North, yaw positive counter-clockwise, steering positive=left.
  control_rate_hz: 20.0
  wheelbase_m: 3.0
  max_steer_rad: 0.38
  stanley_gain: 0.22
  softening_gain: 3.0
  heading_error_gain: 1.0
  crosstrack_error_gain: 0.55
  pure_pursuit_weight: 0.3
  pure_pursuit_lookahead_m: 4.0
  min_pure_pursuit_lookahead_m: 3.0
  max_pure_pursuit_lookahead_m: 7.0
  pure_pursuit_lookahead_speed_gain: 0.5
  steering_filter_alpha: 0.25
  max_steer_rate_radps: 0.4

  # Stable replay speed for the current GPS-only yaw estimate.
  # Set target_speed_override_mps to -1.0 if you want to use each CSV row's
  # target_speed value instead.
  default_target_speed_mps: 1.3
  target_speed_override_mps: 1.3
  max_target_speed_mps: 1.3
  max_accel_cmd: 1.0
  max_brake_cmd: 1.0
  speed_kp: 0.35
  speed_deadband_mps: 0.15
  startup_hold_time_s: 0.5
  startup_ramp_time_s: 3.0
  startup_steer_limit_rad: 0.15

  target_search_window: 50
  waypoint_reached_radius_m: 2.0
  stop_at_final_waypoint: true
  cross_track_deadband_m: 0.05
  path_yaw_lookahead_m: 5.0
  curve_slowdown_heading_rad: 0.35
  min_curve_speed_mps: 0.8
  cte_speed_reduction_gain: 0.25
  allow_target_backtrack: false
  waypoint_smoothing_window: 9
  min_waypoint_spacing_m: 0.2
