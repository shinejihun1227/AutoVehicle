stanley:
  waypoint_file: "$(find yeoms_control)/waypoints/test_straight.csv"
  pose_topic: "/localization/ego_pose"
  twist_topic: "/localization/ego_twist"
  odom_topic: "/localization/ego_odom"
  use_odometry: false
  command_topic: "/control/ctrl_cmd"
  command_type: "twist"
  frame_id: "map"

  # Coordinate convention:
  # map.x=East, map.y=North, yaw positive counter-clockwise, steering positive=left.
  control_rate_hz: 20.0
  wheelbase_m: 3.0
  max_steer_rad: 0.45
  stanley_gain: 0.35
  softening_gain: 2.0
  heading_error_gain: 1.0
  crosstrack_error_gain: 0.75
  steering_filter_alpha: 0.35
  max_steer_rate_radps: 0.6

  default_target_speed_mps: 1.0
  max_accel_cmd: 1.0
  max_brake_cmd: 1.0
  speed_kp: 0.35
  speed_deadband_mps: 0.15

  target_search_window: 50
  waypoint_reached_radius_m: 2.0
  stop_at_final_waypoint: true
  path_yaw_lookahead_m: 3.0
  allow_target_backtrack: false
  waypoint_smoothing_window: 5
  min_waypoint_spacing_m: 0.3
