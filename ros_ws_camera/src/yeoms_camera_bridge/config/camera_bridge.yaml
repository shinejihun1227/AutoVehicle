camera_udp_receiver:
  bind_ip: "0.0.0.0"
  camera_port: 1001
  image_topic: "/sensors/camera/front/compressed"
  frame_info_topic: "/perception/camera/front/frame_info"
  frame_id: "front_camera"
  publish_rate_limit_hz: 30.0
  socket_timeout_sec: 1.0
  max_frame_bytes: 2000000
  save_samples: false
  sample_dir: "/tmp/morai_camera_samples"
  sample_every_n_frames: 30
