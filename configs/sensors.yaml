sensors:
  gps:
    enabled: true
    count: 1
    network: "ROS"
    frame_id: "gps_link"
  imu:
    enabled: true
    count: 1
    network: "ROS"
    frame_id: "imu_link"
  lidar_front:
    enabled: true
    model: "VLP16"
    network: "ROS"
    frame_id: "lidar_front"
    position:
      x: 0.0
      y: 0.0
      z: 0.0
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
  lidar_rear:
    enabled: false
    model: "VLP16"
    network: "ROS"
    frame_id: "lidar_rear"
  camera_front:
    enabled: false
    network: "ROS"
    frame_id: "camera_front"
    pitch_limit_deg: 30

